<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wemove-Registro</title>
    <link rel="icon" href="../../Recursos/FavIcon/Wemove.png" type="image/png">
    <link rel="stylesheet" href="../../Estilos/Componentes/StylesWemove.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
<!---

    <script>
            const navigation = performance.getEntriesByType("navigation")[0];

            if (navigation && navigation.type === "reload") {
            window.location.replace("Carga_inicio2.html");
            }
        </script>  
        
    -->
    
</head>
<body class="background " style=" justify-content:center; display:flex; flex-direction:column; align-items:center; gap:20px; box-sizing: border-box; padding: 0 16px;">
    <div class="sheet-overlay">

    </div>

    <!--Cabecera-->
    <div style="display:flex; gap:16px; justify-content:space-between; padding: 16px 12px; width: 100%">
        <span class="material-symbols-outlined">
            arrow_back
        </span>
        <h2 class="titles_wizard">
            Registrate
        </h2>
        <span class="material-symbols-outlined" style="opacity: 0;">
            arrow_back
        </span>

    </div>
    <!--pasos-->
    <div style="display: flex; justify-content:space-between; height:4px; background-color: var(--color-primary-200); align-items:center; width: 250px;" class="stepsContainer">
        <div class="steps-active" style="left: 120px;">

        </div>
        <div class="steps-default" style="left: 240px;">

        </div>
        <div class="steps-default" style="left: 360px;">

        </div>

    </div>
    <!--Numero del paso-->
    <div class="base-normal">
        Paso 1 de 3
    </div>
    <div style="display:flex; flex-direction:column; gap:12px; align-items:center; justify-content:center;">
        <h3 class="h-4" style="margin:0; color: var(--color-primary-950);">
            ¿Quien eres?
        </h3>
        <p class="base-normal" style="margin:0; color: var(--color-gray-800)">
            Completa tus datos para empezar.
        </p>
    </div>
    <!--imagen de perfil-->
    <div style="position: relative; width: 120px; height: 120px; border-radius: 50%; display:flex; justify-content:center; align-items:center;">
        <!--imagen de perfil-->
        <img
            id="fotoPerfil"
            src="../../Recursos/Avatares/Sin_foto.png"
            alt="Foto de perfil">
        <!--cambio de foto-->
        <div id="abrirAvatares" class="cambiaravatar">

            <span class="material-symbols-outlined" style="font-size: 20px;">
                edit 
            </span>
            
        </div>
    </div>

    <!--ventana de avatares-->
        <div class="sheet-avatares">

            <div class="sheet-indicator"></div>
                <div style="display:flex; flex-direction:column; gap:4px; ">
                <h3 class="h-4" style="margin:0; color: var(--color-primary-950);">
                    Selecciona un avatar
                </h3>

                <p class="base-normal" style="color: var(--color-gray-800); margin:0;">
                    Elige un avatar para tu perfil. Puedes cambiarlo más tarde.
                </p>

                </div>
                

            <div class="avatar-grid">

                <img
                    class="avatar-opcion"
                    src="../../Recursos/Avatares/perfil 1.png"
                    data-avatar="../../Recursos/Avatares/perfil 1.png"
                    alt="Avatar 1">

                <img
                    class="avatar-opcion"
                    src="../../Recursos/Avatares/perfil 2.png"
                    data-avatar="../../Recursos/Avatares/perfil 2.png"
                    alt="Avatar 2">

                <img
                    class="avatar-opcion"
                    src="../../Recursos/Avatares/perfil 3.png"
                    data-avatar="../../Recursos/Avatares/perfil 3.png"
                    alt="Avatar 3">

                <img
                    class="avatar-opcion"
                    src="../../Recursos/Avatares/perfil 4.png"
                    data-avatar="../../Recursos/Avatares/perfil 4.png"
                    alt="Avatar 4">

                <img
                    class="avatar-opcion"
                    src="../../Recursos/Avatares/perfil 5.png"
                    data-avatar="../../Recursos/Avatares/perfil 5.png"
                    alt="Avatar 5">

                <img
                    class="avatar-opcion"
                    src="../../Recursos/Avatares/perfil 6.png"
                    data-avatar="../../Recursos/Avatares/perfil 6.png"
                    alt="Avatar 6">

            </div>

        <div class="sheet-footer">
                <button
                    type="button"
                    id="btnAplicarAvatar"
                    class="btn_drawer_fill"
                    style="width: 100%; max-width: 400px; box-sizing: border-box; color: var(--color-primary-950); background-color: var(--color-secundary-500);">
                    Seleccionar foto de perfil
                </button>
            </div>
        </div>

    <div style="display:flex; flex-direction:column; gap:12px; width: 100%; max-width: 400px; box-sizing: border-box; padding-top: 24px;">
        <form>
            <div style="display:flex; flex-direction:column; gap:4px;">
                <label for="input" class="base-normal" style="color: var(--color-gray-800);">Nombre</label>
                <input type="text" placeholder="Escriba su nombre" id="input" class="input-primary">
                <small class="input-message" id="mensajeNombre" style="height: 15px;"></small>
            </div>

            <button type="submit" class="btn_drawer_fill" style="width: 100%; margin-top: 24px;" id="boton">Siguiente paso</button>
                
        </form>
    </div>


    <script src="../../Logica/registro.js"></script>
</body>
</html>
