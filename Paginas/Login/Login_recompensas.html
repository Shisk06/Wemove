<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wemove-inicio</title>
    <link rel="icon" href="../../Recursos/FavIcon/Wemove.png" type="image/png">
    <link rel="stylesheet" href="../../Estilos/Componentes/StylesWemove.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    
</head>
<body class="background page-container">
    <!--Omitir-->
    <div style="gap: 150px; display: flex; flex-direction: column;">
        <div style="justify-content: start; display: flex;">
            <a href="Login_comunidad.html" class="btn_primary_ghost" style="padding-inline: 0%; max-width: fit-content; text-decoration: none;" >
                <div class="material-symbols-outlined">
                    chevron_left
                </div>
            </a>
        </div>
        <!--Imagen-->
        <div style="display: flex; justify-content: center;">  
            <img src="../../Recursos/Login/Rectangle 18.png" alt="IMG Wemove" >
        </div>
    </div>
    <!--Caja de Texto y dots-->
    <div style="gap:16px; display: flex; flex-direction: column;">
        <h2 class="titles_wizard">
            Celebra con alegría cada logro alcanzado
        </h2>
        <p class="p_wizard">
            Desbloquea insignias y mantén tus rachas. Sube de nivel mientras avanzas y celebra con alegría cada logro.
        </p>
        <div style="display: flex; flex-direction: row; gap: 8px; justify-content: center;">
            <span class="dots_default">
            </span>
            <span class="dots_default">
            </span>
            <span class="dots_active">
            </span>
            
        </div>
    </div>
    <!--boton-->
    <div style="display: flex; justify-content: end; width: 100%;">
        <a href="Login_wemove.html" class="btn_primary_fill" style="text-decoration: none; width: 100%; height:36px; animation: ease-out 3s forwards;">
            <span>
                Disfruta la app 
            </span>
            <div class="material-symbols-outlined">
                chevron_right
            </div>
        </a>
    </div>
</body>
</html>
