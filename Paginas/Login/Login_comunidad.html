<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wemove-inicio</title>
    <link rel="icon" href="../../Recursos/FavIcon/Wemove.png" type="image/png">
    <link rel="stylesheet" href="../../Estilos/Componentes/StylesWemove.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    
</head>
<body class="background page-container">
    <!--Omitir-->
    <div style="gap: 150px; display: flex; flex-direction: column;">
        <div style="justify-content: space-between; display: flex;">
            <a href="Login_bienvenido.html" class="btn_primary_ghost" style="padding-inline: 0%; max-width: fit-content; text-decoration: none;" >
                <div class="material-symbols-outlined">
                    chevron_left
                </div>
            </a>
            <button class="btn_primary_ghost" style="padding-inline: 0%; max-width: fit-content;" >
                <span>
                    Omitir
                </span>
                <div class="material-symbols-outlined">
                    chevron_right
                </div>
            </button>
        </div>
        <!--Imagen-->
        <div style="display: flex; justify-content: center;">  
            <img src="../../Recursos/Login/Rectangle 17.png" alt="IMG Wemove" >
        </div>
    </div>
    <!--Caja de Texto y dots-->
    <div style="gap:16px; display: flex; flex-direction: column;">
        <h2 class="titles_wizard">
            Comparte tu camino junto a otros como tú
        </h2>
        <p class="p_wizard">
            Únete a grupos y comparte tu progreso.Suma esfuerzos con otros como tú y alcanza metas junto a tu comunidad.
        </p>
        <div style="display: flex; flex-direction: row; gap: 8px; justify-content: center;">
            <span class="dots_default">
            </span>
            <span class="dots_active">
            </span>
            <span class="dots_default">
            </span>
        </div>
    </div>
    <!--boton-->
    <div style="display: flex; justify-content: end;">
        <a href="Login_recompensas.html" class="btn_primary_fill" style="text-decoration: none; animation: ease-out 3s forwards;">
            <span>
                Siguiente
            </span>
            <div class="material-symbols-outlined">
                chevron_right
            </div>
        </a>
    </div>
</body>
</html>
